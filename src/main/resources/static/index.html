<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User CRUD</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            color: #222;
        }

        h2 {
            margin-bottom: 12px;
        }

        form {
            margin-bottom: 16px;
        }

        input,
        button {
            padding: 8px;
            margin: 5px 0;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table,
        th,
        td {
            border: 1px solid #ccc;
        }

        th,
        td {
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        .delete-btn {
            border: none;
            cursor: pointer;
            color: #fff;
            background-color: red;
        }

        .edit-btn {
            border: none;
            cursor: pointer;
            color: #fff;
            background-color: orange;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>
    <h2>Form User</h2>

    <form id="userForm">
        <input type="hidden" id="userId">
        <input type="text" id="name" placeholder="Nama" required>
        <input type="text" id="nim" placeholder="NIM" required>
        <button type="submit">Simpan</button>
        <button type="button" onclick="resetForm()">Reset</button>
    </form>

    <div id="message"></div>

    <h2>List User</h2>

    <table>
        <thead>
            <tr>
                <th>Nama</th>
                <th>NIM</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="userTable"></tbody>
    </table>

    <script>
        const BASE_URL = "/api/users";

        function setMessage(text, type) {
            $("#message").text(text).attr("class", type);
        }

        function renderUserRow(user) {
            return `
                <tr>
                    <td>${user.name}</td>
                    <td>${user.nim}</td>
                    <td>
                        <button class="edit-btn" onclick="editUser('${user.id}', '${user.name}', '${user.nim}')">
                            Edit
                        </button>
                        <button class="delete-btn" onclick="deleteUser('${user.id}')">
                            Delete
                        </button>
                    </td>
                </tr>
            `;
        }

        function loadUsers() {
            $.ajax({
                url: BASE_URL,
                type: "GET",
                success: function (users) {
                    $("#userTable").empty();

                    users.forEach(function (user) {
                        $("#userTable").append(renderUserRow(user));
                    });
                },
                error: function (xhr) {
                    console.log(xhr);
                }
            });
        }

        $("#userForm").submit(function (event) {
            event.preventDefault();

            const id = $("#userId").val();
            const userData = {
                name: $("#name").val(),
                nim: $("#nim").val()
            };

            if (id) {
                $.ajax({
                    url: BASE_URL + "/" + id,
                    type: "PUT",
                    contentType: "application/json",
                    data: JSON.stringify(userData),
                    success: function () {
                        setMessage("User berhasil diupdate.", "success");
                        resetForm();
                        loadUsers();
                    },
                    error: function (xhr) {
                        console.log(xhr);
                        setMessage("Gagal update user.", "error");
                    }
                });

                return;
            }

            $.ajax({
                url: BASE_URL,
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify(userData),
                success: function () {
                    setMessage("User berhasil ditambahkan.", "success");
                    resetForm();
                    loadUsers();
                },
                error: function (xhr) {
                    console.log(xhr);
                    setMessage("Error: " + xhr.responseText, "error");
                }
            });
        });

        function editUser(id, name, nim) {
            $("#userId").val(id);
            $("#name").val(name);
            $("#nim").val(nim);

            setMessage("Mode edit aktif.", "success");
        }

        function deleteUser(id) {
            if (!confirm("Yakin ingin hapus user?")) {
                return;
            }

            $.ajax({
                url: BASE_URL + "/" + id,
                type: "DELETE",
                success: function () {
                    setMessage("User berhasil dihapus.", "success");
                    loadUsers();
                },
                error: function (xhr) {
                    console.log(xhr);
                    setMessage("Gagal hapus user.", "error");
                }
            });
        }

        function resetForm() {
            $("#userId").val("");
            $("#name").val("");
            $("#nim").val("");
            $("#message").text("").attr("class", "");
        }

        $(document).ready(function () {
            loadUsers();
        });
    </script>
</body>
</html>
